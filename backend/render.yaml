services:
  - type: web
    name: portfolio-rag-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set this in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      name: faiss-index
      mountPath: /app/rag/vectordb/faiss_index
      sizeGB: 1
